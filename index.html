        }

            z-index: 0;

        }

        .drop:nth-child(2) { width: 100px; height: 100px; bottom: 20%; left: -40px; animation-delay: 3s; }
        .drop:nth-child(3) { width: 70px; height: 70px; top: 40%; right: -20px; animation-delay: 6s; }

            if (biz.name === "Mafia Barbershop") {
                contactHtml += `<a href="https://wa.me/" target="_blank" rel="noopener noreferrer" class="btn btn-wa" style="opacity:0.4;cursor:default;pointer-events:none;"><span>💬</span> WhatsApp</a>`;
                hasWhatsApp = true;
            }
            if (biz.name === "Fatboy Got Barz") {
                contactHtml += `<a href="https://wa.me/" target="_blank" rel="noopener noreferrer" class="btn btn-wa" style="opacity:0.4;cursor:default;pointer-events:none;"><span>💬</span> WhatsApp</a>`;
                hasWhatsApp = true;
            }
            if (biz.name === "Ilyushka Hrushka") {
                contactHtml += `<a href="https://wa.me/" target="_blank" rel="noopener noreferrer" class="btn btn-wa" style="opacity:0.4;cursor:default;pointer-events:none;"><span>💬</span> WhatsApp</a>`;
                hasWhatsApp = true;
            }
            if (biz.name === "Gugu Hair Salon") {
                contactHtml += `<a href="https://wa.me/" target="_blank" rel="noopener noreferrer" class="btn btn-wa" style="opacity:0.4;cursor:default;pointer-events:none;"><span>💬</span> WhatsApp</a>`;
                hasWhatsApp = true;
            }
            if (biz.name === "Interval Cafe") {
                contactHtml += `<a href="https://wa.me/" target="_blank" rel="noopener noreferrer" class="btn btn-wa" style="opacity:0.4;cursor:default;pointer-events:none;"><span>💬</span> WhatsApp</a>`;
                hasWhatsApp = true;
            }

            // If no WhatsApp was added, add a disabled one
            if (!hasWhatsApp && biz.ig) {
                contactHtml += `<span class="btn" style="opacity:0.3;cursor:default;pointer-events:none;"><span>💬</span> WhatsApp</span>`;
            }

            // Business/Website link (Booksy or other)
            if (biz.name === "Fatboy Got Barz") {
                contactHtml += `<a href="https://ftblendz.booksy.com" target="_blank" rel="noopener noreferrer" class="btn btn-booksy"><span>📅</span> Booksy</a>`;
            } else if (biz.ig) {
                contactHtml += `<span class="btn" style="opacity:0.3;cursor:default;pointer-events:none;"><span>🌐</span> Business</span>`;
            } else {
                contactHtml += `<span class="btn" style="opacity:0.3;cursor:default;pointer-events:none;"><span>🌐</span> Business</span>`;
            }

            html += `
                <div class="business-item">
                    <div class="business-name">
                        ${biz.name} 
                        <span class="tag">${biz.tag}</span> 
                        <span class="city-tag">${biz.city}</span>
                    </div>
                    <div class="outreach-message">${biz.outreach}</div>
                    <div class="business-actions">
                        ${contactHtml}
                        <button class="btn btn-copy copy-btn" data-msg="${biz.outreach.replace(/"/g, '&quot;')}"><span>📋</span> Copy</button>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
        document.getElementById('totalCount').textContent = allBusinesses.length;

        // ── Copy functionality ──
        const toast = document.getElementById('toast');
        let toastTimeout = null;

        function showToast(msg = '✓ Copied!') {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const msg = this.getAttribute('data-msg') || 'Hello! I designed a clean website for your business. Mind if I send it?';
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(msg).then(() => {
                        showToast('✓ Outreach copied!');
                    }).catch(() => fallbackCopy(msg));
                } else {
                    fallbackCopy(msg);
                }
            });
        });

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            textarea.style.top = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('✓ Copied!');
            } catch (e) {
                showToast('✗ Could not copy');
            }
            document.body.removeChild(textarea);
        }
    })();
</script>
