<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unfollowers · Instagram ID tool</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #f8f9fc 0%, #eef1f5 100%);
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 2.5rem 2rem 2.8rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25), 0 4px 18px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.2s ease;
        }
        h1 {
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: -0.01em;
            color: #1a1e2b;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.4rem;
        }
        h1 small {
            font-size: 1rem;
            font-weight: 400;
            color: #5b657a;
            background: rgba(0,0,0,0.04);
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            margin-left: 6px;
        }
        .sub {
            color: #3d4559;
            margin-bottom: 2rem;
            font-size: 1rem;
            border-left: 4px solid #d0d9e8;
            padding-left: 1rem;
            background: rgba(255,255,255,0.3);
            border-radius: 0 12px 12px 0;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 8px 8px 8px 20px;
            border-radius: 120px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02), inset 0 1px 3px rgba(0,0,0,0.02);
            border: 1px solid #dce2ec;
            transition: 0.2s;
        }
        .input-group:focus-within {
            border-color: #8b9bcf;
            box-shadow: 0 0 0 4px rgba(107, 126, 189, 0.15);
        }
        .input-group label {
            font-weight: 500;
            color: #2c3447;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .input-group label span {
            background: #eef2f9;
            border-radius: 30px;
            padding: 0 8px;
            font-size: 0.8rem;
            color: #39405a;
        }
        .input-group input {
            border: none;
            background: transparent;
            padding: 12px 6px;
            font-size: 1rem;
            flex: 1;
            min-width: 140px;
            outline: none;
            color: #141824;
            font-weight: 450;
        }
        .input-group input::placeholder {
            color: #939cb3;
            font-weight: 300;
            letter-spacing: -0.2px;
        }
        .input-group button {
            background: #1e2538;
            border: none;
            color: white;
            font-weight: 500;
            padding: 12px 26px;
            border-radius: 60px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .input-group button:hover {
            background: #2d3651;
            transform: scale(1.01);
            box-shadow: 0 8px 16px rgba(22, 28, 45, 0.15);
        }
        .input-group button:active {
            transform: scale(0.97);
        }
        .status-area {
            margin-top: 1.8rem;
            padding: 0.4rem 0 0.2rem;
            font-size: 0.95rem;
            color: #2c3447;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .counter-badge {
            background: #e6ebf4;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1f2740;
        }
        #resultContainer {
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 0.2rem 0.2rem 0.2rem 0.2rem;
            max-height: 360px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
        }
        #resultContainer::-webkit-scrollbar {
            width: 6px;
        }
        #resultContainer::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.02);
            border-radius: 20px;
        }
        #resultContainer::-webkit-scrollbar-thumb {
            background: #bfc9dd;
            border-radius: 20px;
        }
        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(2px);
            transition: 0.1s;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-item:hover {
            background: rgba(255, 255, 255, 0.6);
        }
        .list-item .avatar-placeholder {
            width: 34px;
            height: 34px;
            border-radius: 40px;
            background: #d3dcec;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            color: #1e2538;
            background: #cdd7ea;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .list-item .username {
            font-weight: 500;
            color: #141c2b;
            flex: 1;
            font-size: 0.95rem;
        }
        .list-item .badge {
            background: #eaf0f9;
            border-radius: 40px;
            font-size: 0.7rem;
            padding: 2px 12px;
            color: #2a3450;
            border: 1px solid rgba(0,0,0,0.02);
        }
        .empty-state {
            text-align: center;
            padding: 2.8rem 1rem;
            color: #58607a;
            font-weight: 400;
        }
        .empty-state span {
            font-size: 2.6rem;
            display: block;
            margin-bottom: 8px;
        }
        .footer-note {
            margin-top: 1.8rem;
            font-size: 0.7rem;
            text-align: center;
            color: #727c98;
            border-top: 1px solid #e2e8f2;
            padding-top: 1.5rem;
            letter-spacing: 0.3px;
        }
        .footer-note i {
            font-style: normal;
            background: #eef2f9;
            padding: 0.1rem 0.7rem;
            border-radius: 40px;
        }
        @media (max-width: 500px) {
            .card { padding: 1.8rem 1.2rem; }
            .input-group { padding: 6px 6px 6px 14px; }
            .input-group button { padding: 10px 18px; font-size: 0.9rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>
        <span>🔄</span> Unfollowers
        <small>check</small>
    </h1>
    <div class="sub">
        ⚡ Enter your Instagram ID · see who doesn't follow back
    </div>

    <div class="input-group">
        <label for="instaId">
            @<span>ID</span>
        </label>
        <input type="text" id="instaId" placeholder="e.g. john_doe" value="example_user">
        <button id="checkBtn">🔍 Check</button>
    </div>

    <div class="status-area">
        <span id="statusMessage">✨ Ready</span>
        <span class="counter-badge" id="counterDisplay">0 non‑followers</span>
    </div>

    <!-- result list container -->
    <div id="resultContainer">
        <div class="empty-state">
            <span>👥</span>
            <p style="margin-top: 8px;">No data yet<br><small style="color:#7a84a0;">enter an ID and click check</small></p>
        </div>
    </div>
    <div class="footer-note">
        <i>⚡ demo · mock data for illustration</i>
    </div>
</div>

<script>
    (function() {
        // ----- MOCK DATASET (simulates Instagram following/followers) -----
        // For demonstration: we build a fake network around the entered ID.
        // The function returns { followers: [...], following: [...] }
        function generateMockNetwork(centralId) {
            // Base lists of pretend users (50 unique names)
            const namePool = [
                "luna_art", "mike_travels", "sarah_design", "jordan_fit", "alex_code",
                "emma_wander", "chris_photo", "zara_music", "liam_food", "olivia_books",
                "noah_gaming", "mia_style", "ethan_nature", "amelia_pets", "ben_tech",
                "charlotte_diy", "leo_fitness", "ella_crafts", "daniel_memes", "scarlett_art",
                "james_auto", "lily_wellness", "logan_home", "grace_travel", "lucas_crypto",
                "zoe_fashion", "mason_foodie", "harper_health", "elijah_golf", "abigail_study",
                "oliver_vinyl", "sofia_poetry", "jack_cycling", "victoria_beauty", "thomas_brew",
                "natalie_yoga", "william_piano", "ava_kids", "henry_watch", "chloe_cats",
                "sebastian_film", "penelope_dance", "david_wood", "eleanor_chess", "joseph_sky",
                "claire_plants", "samuel_guitar", "madison_makeup", "dylan_writing", "layla_podcast"
            ];

            // pick 20–35 random followers & 20–35 random following
            const shuffle = (arr) => {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            };

            // pick unique subset
            const getRandomSubset = (size) => {
                const shuffled = shuffle([...namePool]);
                return shuffled.slice(0, size);
            };

            // ensure centralId is not in lists (just in case)
            const filterId = (list) => list.filter(name => name !== centralId);

            const followersCount = Math.floor(Math.random() * 18) + 18;  // 18..35
            const followingCount = Math.floor(Math.random() * 18) + 18; 

            let followers = getRandomSubset(followersCount);
            let following = getRandomSubset(followingCount);

            // force some overlap (mutual) and some non-mutual for realistic demo
            // 1) remove centralId if present
            followers = filterId(followers);
            following = filterId(following);

            // 2) make sure at least 30% of following are NOT in followers (non-follow-back)
            //    and some followers are not in following (they follow you, you don't follow back)
            // but we only care about "following but not followers" (non-follow-back)
            // so we manipulate: 
            const mutual = followers.filter(f => following.includes(f));
            // we want at least 4-8 non-mutual in following
            const nonMutualCount = Math.max(4, Math.floor(following.length * 0.3));
            // pick some from following that are not in followers, if they exist, else add new
            let nonMutualCandidates = following.filter(f => !followers.includes(f));
            while (nonMutualCandidates.length < nonMutualCount) {
                // add random name from pool not already in followers or following
                const candidates = namePool.filter(n => !followers.includes(n) && !following.includes(n) && n !== centralId);
                if (candidates.length === 0) break;
                const randomNew = candidates[Math.floor(Math.random() * candidates.length)];
                following.push(randomNew);
                nonMutualCandidates.push(randomNew);
            }
            // if too many non-mutual, trim
            if (nonMutualCandidates.length > nonMutualCount + 4) {
                const extra = nonMutualCandidates.slice(nonMutualCount);
                following = following.filter(f => !extra.includes(f));
            }

            // final clean
            followers = filterId(followers);
            following = filterId(following);

            // sort for predictability (optional)
            followers.sort();
            following.sort();

            return { followers, following };
        }

        // DOM elements
        const inputField = document.getElementById('instaId');
        const checkBtn = document.getElementById('checkBtn');
        const resultContainer = document.getElementById('resultContainer');
        const statusMessage = document.getElementById('statusMessage');
        const counterDisplay = document.getElementById('counterDisplay');

        // Helper to render the list of non-followers
        function renderNonFollowers(nonFollowersList, totalFollowing) {
            // clear container
            resultContainer.innerHTML = '';

            if (!nonFollowersList || nonFollowersList.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-state';
                emptyDiv.innerHTML = `
                    <span>✅</span>
                    <p style="margin-top: 8px;">Everyone follows you back!<br><small style="color:#7a84a0;">all ${totalFollowing} accounts are mutual</small></p>
                `;
                resultContainer.appendChild(emptyDiv);
                counterDisplay.textContent = `0 non‑followers`;
                return;
            }

            // sort alphabetically
            const sorted = [...nonFollowersList].sort((a, b) => a.localeCompare(b));
            counterDisplay.textContent = `${sorted.length} non‑followers`;

            // create list items
            sorted.forEach(username => {
                const item = document.createElement('div');
                item.className = 'list-item';
                // avatar placeholder (first letter)
                const avatar = document.createElement('div');
                avatar.className = 'avatar-placeholder';
                avatar.textContent = username.charAt(0).toUpperCase();

                const nameSpan = document.createElement('span');
                nameSpan.className = 'username';
                nameSpan.textContent = `@${username}`;

                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.textContent = 'not following back';

                item.appendChild(avatar);
                item.appendChild(nameSpan);
                item.appendChild(badge);
                resultContainer.appendChild(item);
            });
        }

        // main function: process ID
        function processId(instagramId) {
            const trimmedId = instagramId.trim();
            if (trimmedId === '') {
                statusMessage.textContent = '⚠️ Please enter an Instagram ID';
                resultContainer.innerHTML = `
                    <div class="empty-state">
                        <span>📝</span>
                        <p>Enter an ID to check</p>
                    </div>
                `;
                counterDisplay.textContent = '0 non‑followers';
                return;
            }

            statusMessage.textContent = `⏳ checking @${trimmedId} ...`;

            // simulate network delay (like API call)
            setTimeout(() => {
                try {
                    // generate mock data based on the ID (deterministic-ish)
                    const { followers, following } = generateMockNetwork(trimmedId);
                    
                    // find users that the ID follows but who do NOT follow back
                    const nonFollowers = following.filter(user => !followers.includes(user));

                    statusMessage.textContent = `✅ @${trimmedId} · ${following.length} following, ${followers.length} followers`;
                    renderNonFollowers(nonFollowers, following.length);

                } catch (err) {
                    statusMessage.textContent = '❌ Oops, something went wrong.';
                    resultContainer.innerHTML = `
                        <div class="empty-state">
                            <span>⚠️</span>
                            <p>Error processing data</p>
                        </div>
                    `;
                    counterDisplay.textContent = 'error';
                }
            }, 320); // slight delay for realism
        }

        // event listeners
        checkBtn.addEventListener('click', function() {
            const id = inputField.value;
            processId(id);
        });

        // Enter key support
        inputField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkBtn.click();
            }
        });

        // initial load with default example
        window.addEventListener('load', function() {
            // if input has default value, process on load
            if (inputField.value.trim() !== '') {
                processId(inputField.value);
            } else {
                // show empty
                resultContainer.innerHTML = `
                    <div class="empty-state">
                        <span>👥</span>
                        <p style="margin-top: 8px;">No data yet<br><small style="color:#7a84a0;">enter an ID and click check</small></p>
                    </div>
                `;
                counterDisplay.textContent = '0 non‑followers';
                statusMessage.textContent = '✨ Ready';
            }
        });

    })();
</script>
</body>
</html>
