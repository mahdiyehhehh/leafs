<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Andjela Nikolic · Botanical booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f3ee;
            font-family: 'Inter', sans-serif;
            color: #1e2b2b;
            padding: 1rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 12px 32px -8px rgba(30, 43, 43, 0.08);
            padding: 1.5rem 1.25rem 2rem;
            border: 1px solid rgba(160, 140, 120, 0.12);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e8e3db;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .brand-icon {
            background: #e8efe4;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3f5e34;
            font-size: 1.1rem;
        }

        .brand h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.4rem;
            color: #1e2b2b;
            letter-spacing: -0.3px;
        }

        .brand h1 span {
            font-weight: 400;
            font-style: italic;
            color: #56784a;
        }

        .tag {
            font-size: 0.65rem;
            background: #eef3eb;
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            font-weight: 500;
            color: #2f422a;
            border: 1px solid #d7dfd0;
            letter-spacing: 0.2px;
        }

        .artist-card {
            background: #f9f8f5;
            padding: 1rem 1.2rem;
            border-radius: 24px;
            margin-bottom: 2rem;
            border: 1px solid #eae5dd;
        }

        .artist-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .artist-avatar {
            width: 52px;
            height: 52px;
            background: #d8e3d2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.2rem;
            color: #2b4224;
            font-family: 'Playfair Display', serif;
            flex-shrink: 0;
        }

        .artist-info {
            flex: 1;
            min-width: 0;
        }

        .artist-info h2 {
            font-size: 1.05rem;
            font-weight: 600;
            color: #1d2a2a;
            letter-spacing: -0.2px;
        }

        .artist-info .sub {
            font-size: 0.72rem;
            color: #5e6e62;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 0.8rem;
            margin-top: 0.1rem;
        }

        .artist-info .sub i {
            color: #56784a;
            width: 1rem;
            font-size: 0.7rem;
        }

        .stats {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.3rem;
            flex-wrap: wrap;
        }

        .stats span {
            font-size: 0.65rem;
            font-weight: 500;
            color: #3c4d3e;
            background: #edf0e9;
            padding: 0.1rem 0.7rem;
            border-radius: 40px;
        }

        .booking-headline {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 400;
            color: #1e2b2b;
            margin-bottom: 1.5rem;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .booking-headline i {
            color: #56784a;
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.78rem;
            color: #2a3d2e;
            margin-bottom: 0.3rem;
            letter-spacing: 0.1px;
        }

        .form-group label i {
            color: #56784a;
            width: 1.1rem;
            font-size: 0.75rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 1px solid #dad5cb;
            border-radius: 40px;
            background: #fcfbf9;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: 0.15s;
            outline: none;
            color: #1c2727;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #7a9b6b;
            box-shadow: 0 0 0 3px rgba(90, 130, 80, 0.08);
            background: white;
        }

        .form-group textarea {
            border-radius: 20px;
            resize: vertical;
            min-height: 60px;
        }

        .row2 {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .row2 .form-group {
            flex: 1;
            min-width: 120px;
        }

        .btn-primary {
            background: #2f422a;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            font-size: 0.95rem;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(50, 75, 45, 0.12);
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 1px solid #3a5533;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            background: #1f3320;
            transform: scale(0.98);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-primary i {
            font-size: 0.9rem;
        }

        .booking-summary {
            background: #f4f7f1;
            border-radius: 24px;
            padding: 1.2rem 1.2rem 1rem;
            margin: 1.8rem 0 0.8rem;
            border: 1px solid #dce4d4;
            transition: 0.2s;
        }

        .summary-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.8rem;
            color: #2d402b;
            letter-spacing: 0.3px;
            margin-bottom: 0.6rem;
        }

        .summary-title i {
            color: #56784a;
        }

        .summary-content {
            background: white;
            padding: 0.9rem 1rem;
            border-radius: 16px;
            font-size: 0.82rem;
            line-height: 1.8;
            color: #1d2a27;
            border: 1px solid #e2eade;
            white-space: pre-line;
            word-break: break-word;
            font-family: 'Inter', monospace;
            letter-spacing: 0.1px;
        }

        .action-row {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .btn-outline {
            background: white;
            border: 1.5px solid #7a8f6e;
            color: #2b4028;
            font-weight: 500;
            padding: 0.6rem 1rem;
            border-radius: 60px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .btn-outline i {
            color: #3f5e34;
            font-size: 0.85rem;
        }

        .btn-outline:hover {
            background: #e4ede0;
            border-color: #4b6a3d;
        }

        .btn-outline:active {
            transform: scale(0.97);
        }

        .btn-instagram {
            background: #1e2b2b;
            border: 1.5px solid #1e2b2b;
            color: white;
            flex: 1.4;
            min-width: 130px;
        }

        .btn-instagram i {
            color: white;
        }

        .btn-instagram:hover {
            background: #0e1a1a;
            border-color: #0e1a1a;
        }

        .copy-feedback {
            font-size: 0.7rem;
            color: #3f6b39;
            background: #e2f0db;
            padding: 0.15rem 0.9rem;
            border-radius: 40px;
            display: inline-block;
            margin-top: 0.4rem;
        }

        .hidden {
            display: none !important;
        }

        .footnote {
            margin-top: 2rem;
            font-size: 0.6rem;
            color: #7d8d77;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            border-top: 1px solid #e6e7df;
            padding-top: 1.2rem;
            letter-spacing: 0.2px;
        }

        .footnote i {
            color: #56784a;
            font-size: 0.7rem;
        }

        @media (max-width: 400px) {
            .container {
                padding: 1rem 0.9rem;
            }
            .artist-row {
                flex-wrap: wrap;
            }
            .row2 .form-group {
                min-width: 100%;
            }
            .action-row {
                flex-direction: column;
            }
            .btn-outline,
            .btn-instagram {
                width: 100%;
                flex: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- header -->
        <div class="header">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-seedling"></i></div>
                <h1>Botanical<span>.</span></h1>
            </div>
            <div class="tag">fresh · style · love</div>
        </div>

        <!-- artist card -->
        <div class="artist-card">
            <div class="artist-row">
                <div class="artist-avatar">AN</div>
                <div class="artist-info">
                    <h2>Andjela Nikolic</h2>
                    <div class="sub">
                        <span><i class="fas fa-map-pin"></i> Arandjelvac</span>
                        <span><i class="fas fa-paint-brush"></i> Professional makeup</span>
                        <span><i class="fas fa-calendar-check"></i> DM booking</span>
                    </div>
                    <div class="stats">
                        <span>150 posts</span>
                        <span>288 followers</span>
                        <span>332 following</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- headline -->
        <div class="booking-headline">
            <i class="fas fa-calendar-alt"></i> Book your makeup
        </div>

        <!-- form -->
        <form id="bookingForm">
            <div class="form-group">
                <label><i class="far fa-user"></i> Full name</label>
                <input type="text" id="fullName" placeholder="Milica Jovanovic" required>
            </div>

            <div class="row2">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="mica@example.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone-alt"></i> Phone</label>
                    <input type="tel" id="phone" placeholder="+381 64 123 4567">
                </div>
            </div>

            <div class="row2">
                <div class="form-group">
                    <label><i class="fas fa-calendar-day"></i> Date</label>
                    <input type="date" id="bookingDate" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-clock"></i> Time</label>
                    <input type="time" id="bookingTime" value="10:00">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-pen-fancy"></i> Service</label>
                <select id="service">
                    <option value="Bridal makeup">Bridal makeup</option>
                    <option value="Evening glam">Evening glam</option>
                    <option value="Editorial photo">Editorial photo</option>
                    <option value="Natural everyday">Natural everyday</option>
                    <option value="Masterclass group">Masterclass group</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-comment"></i> Special requests</label>
                <textarea id="specialRequests" placeholder="Skin type, allergies, preferred style"></textarea>
            </div>

            <button type="submit" class="btn-primary" id="generateBtn">
                <i class="fas fa-magic"></i> Generate summary
            </button>
        </form>

        <!-- summary -->
        <div id="summaryContainer" class="booking-summary hidden">
            <div class="summary-title">
                <span><i class="fas fa-clipboard-list"></i> Booking details</span>
                <span style="font-weight:400; font-size:0.65rem; background:#e4eee0; padding:0.1rem 0.8rem; border-radius:40px;">ready to DM</span>
            </div>
            <div id="summaryText" class="summary-content"></div>

            <div class="action-row">
                <button class="btn-outline" id="copyBtn"><i class="fas fa-copy"></i> Copy</button>
                <button class="btn-outline btn-instagram" id="sendDMBtn"><i class="fab fa-instagram"></i> Send DM</button>
            </div>
            <div id="copyFeedback" class="hidden" style="text-align:right;">
                <span class="copy-feedback"><i class="fas fa-check-circle"></i> copied</span>
            </div>
        </div>

        <div class="footnote">
            <i class="fas fa-leaf"></i>
            <span>Botanical · 2026 · design for Andjela Nikolic</span>
            <i class="fas fa-seedling"></i>
        </div>
    </div>

    <script>
        (function() {
            const form = document.getElementById('bookingForm');
            const summaryContainer = document.getElementById('summaryContainer');
            const summaryText = document.getElementById('summaryText');
            const copyBtn = document.getElementById('copyBtn');
            const sendDMBtn = document.getElementById('sendDMBtn');
            const copyFeedback = document.getElementById('copyFeedback');

            function buildSummary() {
                const name = document.getElementById('fullName').value.trim() || '—';
                const email = document.getElementById('email').value.trim() || '—';
                const phone = document.getElementById('phone').value.trim() || '—';
                const date = document.getElementById('bookingDate').value || '—';
                const time = document.getElementById('bookingTime').value || '—';
                const service = document.getElementById('service').value;
                const requests = document.getElementById('specialRequests').value.trim() || '—';

                let displayDate = date;
                if (date !== '—' && date !== '') {
                    const d = new Date(date + 'T00:00:00');
                    if (!isNaN(d)) {
                        displayDate = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                    }
                }

                return 'BOOKING REQUEST · Andjela Nikolic\n\n' +
                       'Name: ' + name + '\n' +
                       'Email: ' + email + '\n' +
                       'Phone: ' + phone + '\n' +
                       'Date: ' + displayDate + '\n' +
                       'Time: ' + time + '\n' +
                       'Service: ' + service + '\n' +
                       'Requests: ' + requests + '\n\n' +
                       'Please confirm availability. Thank you!';
            }

            function updateSummary() {
                summaryText.textContent = buildSummary();
                summaryContainer.classList.remove('hidden');
                copyFeedback.classList.add('hidden');
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const name = document.getElementById('fullName').value.trim();
                const email = document.getElementById('email').value.trim();
                if (!name || !email) {
                    alert('Please fill in your name and email.');
                    return;
                }
                updateSummary();
                summaryContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });

            copyBtn.addEventListener('click', function() {
                const text = summaryText.textContent;
                if (!text) return;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => {
                        copyFeedback.classList.remove('hidden');
                        setTimeout(() => { copyFeedback.classList.add('hidden'); }, 2000);
                    }).catch(() => {
                        fallbackCopy(text);
                    });
                } else {
                    fallbackCopy(text);
                }
            });

            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    copyFeedback.classList.remove('hidden');
                    setTimeout(() => { copyFeedback.classList.add('hidden'); }, 2000);
                } catch (e) {
                    alert('Unable to copy. Please select the text manually.');
                }
                document.body.removeChild(textarea);
            }

            sendDMBtn.addEventListener('click', function() {
                const text = summaryText.textContent;
                if (!text) {
                    alert('Please generate booking summary first.');
                    return;
                }
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => {
                        window.open('https://www.instagram.com/andjela.maakeupp/', '_blank');
                        copyFeedback.classList.remove('hidden');
                        setTimeout(() => { copyFeedback.classList.add('hidden'); }, 3000);
                    }).catch(() => {
                        window.open('https://www.instagram.com/andjela.maakeupp/', '_blank');
                    });
                } else {
                    window.open('https://www.instagram.com/andjela.maakeupp/', '_blank');
                }
            });

            // Set default date to tomorrow
            (function setDefaultDate() {
                const dateInput = document.getElementById('bookingDate');
                if (dateInput) {
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    const year = tomorrow.getFullYear();
                    const month = String(tomorrow.getMonth() + 1).padStart(2, '0');
                    const day = String(tomorrow.getDate()).padStart(2, '0');
                    dateInput.value = year + '-' + month + '-' + day;
                }
            })();

            summaryContainer.classList.add('hidden');
        })();
    </script>
</body>
</html>
