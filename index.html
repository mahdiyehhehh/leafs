<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F4F2E2;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 16px 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(162, 185, 213, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(170, 204, 177, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(176, 16, 19, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: shimmer 20s ease-in-out infinite alternate;
        }

        @keyframes shimmer {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(2%, 1%) scale(1.05); }
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(244, 242, 226, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 20px 16px 28px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 8px 32px rgba(176, 16, 19, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 1;
        }

        .drop {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6), rgba(162, 185, 213, 0.15));
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                inset -4px -4px 8px rgba(0,0,0,0.04),
                inset 4px 4px 8px rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 0;
            animation: float 12s ease-in-out infinite alternate;
        }

        .drop:nth-child(1) { width: 180px; height: 180px; top: -40px; right: -60px; animation-delay: 0s; }
        .drop:nth-child(2) { width: 120px; height: 120px; bottom: 20%; left: -50px; animation-delay: 3s; }
        .drop:nth-child(3) { width: 80px; height: 80px; top: 40%; right: -30px; animation-delay: 6s; }
        .drop:nth-child(4) { width: 200px; height: 200px; bottom: -80px; right: -40px; animation-delay: 2s; background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.4), rgba(170, 204, 177, 0.08)); }
        .drop:nth-child(5) { width: 100px; height: 100px; top: 10%; left: -30px; animation-delay: 5s; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5), rgba(162, 185, 213, 0.1)); }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(10px, 15px) scale(1.03) rotate(3deg); }
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 12px;
            border-bottom: 2px solid rgba(162, 185, 213, 0.4);
            padding-bottom: 14px;
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }

        .time {
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: 0.5px;
            color: #B01013;
            background: rgba(162, 185, 213, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 0 18px;
            border-radius: 40px;
            line-height: 1.5;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .badge-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge-group span {
            font-weight: 600;
            font-size: 0.75rem;
            background: rgba(162, 185, 213, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 4px 16px;
            border-radius: 40px;
            color: #1e1e1e;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 2px 0 rgba(176, 16, 19, 0.2);
        }

        .badge-group span:last-child {
            background: rgba(170, 204, 177, 0.35);
        }

        .section-header {

            align-items: center;
            gap: 12px;
            margin: 12px 0 14px 0;
            padding: 0 4px;
            position: relative;
            z-index: 1;

        .section-header h2 {

            font-weight: 700;
            color: #1e2a33;
            background: rgba(170, 204, 177, 0.35);

            border: 1px solid rgba(255, 255, 255, 0.3);

            align-items: center;
            gap: 8px;
        }

        .section-divider {
            flex: 1;
            height: 2px;
            background: rgba(162, 185, 213, 0.3);
        }

        .count-badge {
            background: rgba(176, 16, 19, 0.15);
            backdrop-filter: blur(4px);
            color: #B01013;
            border-radius: 40px;
            padding: 0 10px;
            font-size: 0.6rem;
            font-weight: 600;
            line-height: 1.8;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .business-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 4px 0 8px;
            position: relative;
            z-index: 1;
        }

        .business-item {
            background: rgba(252, 250, 245, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 16px 16px 14px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow:

            gap: 10px;

            position: relative;
        }

        .business-item.done {

            border-color: rgba(170, 204, 177, 0.5);
            box-shadow: 0 4px 16px rgba(170, 204, 177, 0.1);
        }

        .business-item.done .personal-note {
            background: rgba(170, 204, 177, 0.15);
        }

        .business-item.done .done-check {
            display: inline-block;
        }

        .business-item:active {
            transform: scale(0.98);
        }

        .business-name {

            font-size: 1.05rem;
            color: #1e2a33;
            display: flex;
            align-items: center;
            flex-wrap: wrap;

        }

            color: #1e2a33;
            border: 1px solid rgba(255, 255, 255, 0.2);
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }

            font-size: 0.5rem;
            font-weight: 600;
            padding: 0 10px;
            border-radius: 40px;
            color: #1e2a33;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

            background: rgba(176, 16, 19, 0.15);
            color: #B01013;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0 10px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .personal-note {

            align-items: center;

            margin-top: 2px;

            background: rgba(162, 185, 213, 0.25);

            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 42, 51, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);

            pointer-events: none;
            z-index: 999;
            max-width: 90%;

        }

        .toast.show {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .container { padding: 14px 12px; }

        }
    </style>
</head>

        const container = document.getElementById('businessList');
        let html = '';

        allBusinesses.forEach((biz, index) => {
            let contactHtml = '';
            const igHandle = biz.ig || '';

            // Build contact button
            if (biz.contact === 'wa' && biz.wa) {
                contactHtml = `<a href="https://wa.me/${biz.wa}" target="_blank" rel="noopener noreferrer" class="btn btn-wa"><span>💬</span> WhatsApp</a>`;
            } else if (biz.contact === 'line' && biz.line) {
                contactHtml = `<a href="https://lin.ee/${biz.line}" target="_blank" rel="noopener noreferrer" class="btn btn-line"><span>💬</span> Line</a>`;
            } else if (biz.ig) {
                contactHtml = `<a href="https://instagram.com/${biz.ig}" target="_blank" rel="noopener noreferrer" class="btn btn-ig"><span>📷</span> ${biz.ig}</a>`;
            } else {
                contactHtml = `<span class="btn" style="opacity:0.4;cursor:default;pointer-events:none;">No contact</span>`;
            }

            // Facebook / Messenger link
            const fbLink = biz.fb ? `https://facebook.com/${biz.fb}` : '#';
            const messengerLink = biz.fb ? `https://m.me/${biz.fb}` : '#';

            let actionsHtml = `
                ${contactHtml}
                <a href="${fbLink}" target="_blank" rel="noopener noreferrer" class="btn btn-fb" ${!biz.fb ? 'style="opacity:0.4;cursor:default;pointer-events:none;"' : ''}><span>📘</span> FB</a>
                <a href="${messengerLink}" target="_blank" rel="noopener noreferrer" class="btn btn-messenger" ${!biz.fb ? 'style="opacity:0.4;cursor:default;pointer-events:none;"' : ''}><span>💬</span> Messenger</a>
                <button class="btn btn-copy copy-btn" data-msg="${biz.note.replace(/"/g, '&quot;')}"><span>📋</span> Copy</button>
                <button class="btn btn-done done-toggle" data-index="${index}"><span>☐</span> Done</button>
            `;

            html += `
                <div class="business-item" data-index="${index}">
                    <div class="business-name">
                        ${biz.name} 
                        <span class="tag">${biz.tag}</span> 
                        <span class="city-tag">${biz.city}</span>
                        <span class="done-check">✔️</span>
                    </div>
                    <div class="personal-note">${biz.note}</div>
                    <div class="business-actions">
                        ${actionsHtml}
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
        document.getElementById('totalCount').textContent = allBusinesses.length;

        // ── Done toggle ──
        document.querySelectorAll('.done-toggle').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const index = this.getAttribute('data-index');
                const item = document.querySelector(`.business-item[data-index="${index}"]`);
                const check = item.querySelector('.done-check');
                const isDone = item.classList.toggle('done');

                if (isDone) {
                    this.innerHTML = '<span>☑</span> Done';
                    this.classList.add('active');
                    check.style.display = 'inline-block';
                    showToast('✓ Marked as done!');
                } else {
                    this.innerHTML = '<span>☐</span> Done';
                    this.classList.remove('active');
                    check.style.display = 'none';
                    showToast('↻ Unmarked');
                }
            });
        });

        // ── Copy ──
        const toast = document.getElementById('toast');
        let toastTimeout = null;

        function showToast(msg = '✓ Copied!') {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const msg = this.getAttribute('data-msg') || 'Hello! I designed a clean website for your business. Mind if I send it?';
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(msg).then(() => {
                        showToast('✓ Copied!');
                    }).catch(() => fallbackCopy(msg));
                } else {
                    fallbackCopy(msg);
                }
            });
        });

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            textarea.style.top = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('✓ Copied!');
            } catch (e) {
                showToast('✗ Could not copy');
            }
            document.body.removeChild(textarea);
        }
    })();
