            { name: "Woops", ig: "", tag: "Bakery", city: "Coeur d'Alene, ID", note: "Largest French macaron company in the U.S. A website would help you showcase your locations." },
            { name: "Saray Bakery", ig: "", tag: "Bakery", city: "Myrtle Beach, SC", note: "Myrtle Beach's favorite spot for daily fresh pastries. A website would help you reach more customers." },
            { name: "Liberty Social", ig: "", tag: "Business", city: "Ontario", note: "Created for connection. A website would help you share your content and connect with your audience." },
            { name: "Kristin Brunet", ig: "", tag: "Digital Creator", city: "Mandeville, LA", note: "Fitness Instructor and Personal Trainer. A website would help you share your services and book clients." }
        ];

        const container = document.getElementById('businessList');
        let html = '';

        allBusinesses.forEach((biz, index) => {
            // Build contact button
            let contactHtml = '';
            const igHandle = biz.ig || '';

            if (biz.contact === 'wa' && biz.wa) {
                contactHtml = `<a href="https://wa.me/${biz.wa}" target="_blank" rel="noopener noreferrer" class="btn btn-wa"><span>💬</span> WhatsApp</a>`;
            } else if (biz.contact === 'ig' && biz.ig) {
                contactHtml = `<a href="https://instagram.com/${biz.ig}" target="_blank" rel="noopener noreferrer" class="btn btn-ig"><span>📷</span> ${biz.ig}</a>`;
            } else if (biz.contact === 'line' && biz.line) {
                contactHtml = `<a href="https://lin.ee/${biz.line}" target="_blank" rel="noopener noreferrer" class="btn btn-line"><span>💬</span> Line</a>`;
            } else if (biz.ig) {
                contactHtml = `<a href="https://instagram.com/${biz.ig}" target="_blank" rel="noopener noreferrer" class="btn btn-ig"><span>📷</span> ${biz.ig}</a>`;
            } else {
                contactHtml = `<span class="btn" style="opacity:0.5; cursor:default;">No contact</span>`;
            }

            // Facebook link (if IG exists)
            const fbLink = biz.ig ? `https://facebook.com/${biz.ig}` : '#';

            // WhatsApp fallback
            const waLink = biz.ig ? `https://wa.me/?text=Hey! I saw your business on Instagram` : '#';

            // Build actions
            let actionsHtml = `
                ${contactHtml}
                <a href="${fbLink}" target="_blank" rel="noopener noreferrer" class="btn btn-fb" ${!biz.ig ? 'style="opacity:0.4;cursor:default;pointer-events:none;"' : ''}><span>📘</span> FB</a>
                <button class="btn btn-copy copy-btn" data-msg="${biz.note.replace(/"/g, '&quot;')}"><span>📋</span> Copy</button>
                <button class="btn btn-done done-toggle" data-index="${index}"><span>☐</span> Done</button>
            `;

            html += `
                <div class="business-item" data-index="${index}">
                    <div class="business-name">
                        ${biz.name} 
                        <span class="tag">${biz.tag}</span> 
                        <span class="city-tag">${biz.city}</span>
                        <span class="done-check">✔️</span>
                    </div>
                    <div class="personal-note">${biz.note}</div>
                    <div class="business-actions">
                        ${actionsHtml}
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;

        // Update total count
        document.getElementById('totalCount').textContent = allBusinesses.length;

        // ── Done toggle functionality ──
        document.querySelectorAll('.done-toggle').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const index = this.getAttribute('data-index');
                const item = document.querySelector(`.business-item[data-index="${index}"]`);
                const check = item.querySelector('.done-check');
                const isDone = item.classList.toggle('done');

                if (isDone) {
                    this.innerHTML = '<span>☑</span> Done';
                    this.classList.add('active');
                    check.style.display = 'inline-block';
                    showToast('✓ Marked as done!');
                } else {
                    this.innerHTML = '<span>☐</span> Done';
                    this.classList.remove('active');
                    check.style.display = 'none';
                    showToast('↻ Unmarked');
                }
            });
        });

        // ── Copy functionality ──
        const toast = document.getElementById('toast');
        let toastTimeout = null;

        function showToast(msg = '✓ Copied!') {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const msg = this.getAttribute('data-msg') || 'Hello! I designed a clean website for your business. Mind if I send it?';
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(msg).then(() => {
                        showToast('✓ Copied!');
                    }).catch(() => fallbackCopy(msg));
                } else {
                    fallbackCopy(msg);
                }
            });
        });

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            textarea.style.top = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('✓ Copied!');
            } catch (e) {
                showToast('✗ Could not copy');
            }
            document.body.removeChild(textarea);
        }
    })();
</script>
</body>
</html>
